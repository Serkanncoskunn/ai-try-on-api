<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>AI Try-On Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 8px; margin-top: 5px; }
        button { padding: 10px 20px; background-color: #007bff; color: white; border: none; cursor: pointer; }
        button:disabled { background-color: #ccc; }
        #result-container { margin-top: 20px; text-align: center; }
        #result-image { max-width: 100%; height: auto; display: none; border: 2px solid #ddd; border-radius: 8px;}
        #loading { display: none; color: #555; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Deneme Kabini Testi</h2>
    
    <div class="form-group">
        <label>Kullanıcı Fotoğrafı (Yüz):</label>
        <input type="file" id="userPhoto" accept="image/*">
    </div>

    <div class="form-group">
        <label>Ürün/Manken Fotoğrafı URL'si:</label>
        <input type="text" id="productUrl" placeholder="https://ornek.site.com/elbise.jpg">
    </div>

    <button id="submitBtn" onclick="testAPI()">Dene</button>

    <div id="result-container">
        <p id="loading">⏳ Yapay zeka işliyor, lütfen bekleyin... (Bu işlem 15-20 saniye sürebilir)</p>
        <p id="duration-text"></p>
        <img id="result-image" src="" alt="Sonuç">
    </div>

    <script>
        async function testAPI() {
            const photoInput = document.getElementById('userPhoto');
            const urlInput = document.getElementById('productUrl');
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const resultImage = document.getElementById('result-image');
            const durationText = document.getElementById('duration-text');

            if (!photoInput.files[0] || !urlInput.value) {
                alert("Lütfen hem bir fotoğraf seçin hem de bir URL girin!");
                return;
            }

            // Arayüzü bekleme moduna al
            submitBtn.disabled = true;
            loading.style.display = 'block';
            resultImage.style.display = 'none';
            durationText.innerText = "";

            // Form verisini hazırla
            const formData = new FormData();
            formData.append("user_photo", photoInput.files[0]);
            formData.append("product_url", urlInput.value);

            try {
                // API'ye POST isteği at
                const response = await fetch("https://ai-try-on-api-production.up.railway.app/deneme-yap", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                if (data.status === "success") {
                    resultImage.src = data.image_data;
                    resultImage.style.display = 'block';
                    durationText.innerText = "İşlem Süresi: " + data.duration;
                } else {
                    alert("Hata: " + data.message);
                }
            } catch (error) {
                alert("Bağlantı hatası: " + error.message);
            } finally {
                // Arayüzü normale döndür
                submitBtn.disabled = false;
                loading.style.display = 'none';
            }
        }
    </script>
</body>
</html>
